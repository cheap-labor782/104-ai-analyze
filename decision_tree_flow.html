    <script>
        const container = document.getElementById('viewport-container');
        const content = document.getElementById('pan-zoom-content');
        let scale = 0.85;
        let x = (window.innerWidth - 1450 * scale) / 2;
        let y = 130;
        let isDragging = false;
        let startX, startY;

        function updateTransform() { content.style.transform = `translate(${x}px, ${y}px) scale(${scale})`; }
        updateTransform();

        container.addEventListener('mousedown', (e) => { 
            if(e.target.closest('.home-btn')) return; // 防止點擊按鈕時觸發畫布拖曳
            isDragging = true; 
            startX = e.clientX - x; 
            startY = e.clientY - y; 
        });
        window.addEventListener('mousemove', (e) => { if (!isDragging) return; x = e.clientX - startX; y = e.clientY - startY; updateTransform(); });
        window.addEventListener('mouseup', () => { isDragging = false; });
        container.addEventListener('wheel', (e) => {
            e.preventDefault();
            const zoomFactor = 1.1;
            const mouseX = e.clientX; const mouseY = e.clientY;
            const contentX = (mouseX - x) / scale; const contentY = (mouseY - y) / scale;
            if (e.deltaY < 0) { scale = Math.min(scale * zoomFactor, 5); } else { scale = Math.max(scale / zoomFactor, 0.2); }
            x = mouseX - contentX * scale; y = mouseY - contentY * scale;
            updateTransform();
        }, { passive: false });
        window.addEventListener('resize', () => { updateTransform(); });
    </script>
