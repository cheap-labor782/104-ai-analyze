    <script>
        const container = document.getElementById('viewport-container');
        const content = document.getElementById('pan-zoom-content');

        // 自動滿版動態算計：根據使用者目前的瀏覽器寬度自動定錨初始縮放比
        let baseWidth = 1920;
        let scale = Math.max(window.innerWidth / (baseWidth + 100), 0.45); 
        let x = (window.innerWidth - baseWidth * scale) / 2 + 30;
        let y = 125; // 預留頂部標題空間
        
        let isDragging = false;
        let startX, startY;

        function updateTransform() {
            content.style.transform = `translate(${x}px, ${y}px) scale(${scale})`;
        }
        updateTransform();

        // 拖曳處理
        container.addEventListener('mousedown', (e) => {
            if(e.target.closest('.home-btn')) return; // 防止點擊按鈕時誤觸畫布拖曳
            isDragging = true;
            startX = e.clientX - x;
            startY = e.clientY - y;
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            x = e.clientX - startX;
            y = e.clientY - startY;
            updateTransform();
        });

        window.addEventListener('mouseup', () => { isDragging = false; });

        // 滾輪縮放
        container.addEventListener('wheel', (e) => {
            e.preventDefault();
            const zoomFactor = 1.08;
            const mouseX = e.clientX;
            const mouseY = e.clientY;
            const contentX = (mouseX - x) / scale;
            const contentY = (mouseY - y) / scale;

            if (e.deltaY < 0) {
                scale = Math.min(scale * zoomFactor, 3.5);
            } else {
                scale = Math.max(scale / zoomFactor, 0.15);
            }

            x = mouseX - contentX * scale;
            y = mouseY - contentY * scale;
            updateTransform();
        }, { passive: false });

        // 視窗自適應
        window.addEventListener('resize', () => {
            scale = Math.max(window.innerWidth / (baseWidth + 100), 0.45);
            x = (window.innerWidth - baseWidth * scale) / 2 + 30;
            updateTransform();
        });
    </script>
